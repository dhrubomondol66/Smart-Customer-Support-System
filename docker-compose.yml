version: '3.11'

services:

  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: support_db
    restart: always
    environment:
      POSTGRES_DB:       support_inbox
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5


  # ─────────────────────────────────────────────
  # Redis — Cache + Celery Broker + Channels
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: support_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5


  # ─────────────────────────────────────────────
  # Django App (Daphne ASGI server)
  # ─────────────────────────────────────────────
  web:
    build: .
    container_name: support_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST:   db
      DB_PORT:   5432
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  # ─────────────────────────────────────────────
  # Celery Worker — background tasks
  # ─────────────────────────────────────────────
  celery:
    build: .
    container_name: support_celery
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST:   db
      DB_PORT:   5432
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  # ─────────────────────────────────────────────
  # Celery Beat — periodic tasks (optional)
  # ─────────────────────────────────────────────
  celery-beat:
    build: .
    container_name: support_celery_beat
    restart: always
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST:   db
      DB_PORT:   5432
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data: